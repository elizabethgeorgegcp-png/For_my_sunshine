<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>For my sunshine ☀️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#b8dcf6;
  --card:#f7fbff;
  --shadow:0 10px 30px rgba(15,23,42,0.12);
}

html,body{
  height:100%;
  margin:0;
  font-family:"Poppins", sans-serif;
  background: linear-gradient(180deg,var(--bg) 0%,rgba(255,255,255,0.6) 100%);
  color:#000;
}

/* Layout */
.page-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 12px;
}

.card{
  width:100%;
  max-width:420px;
  background:linear-gradient(180deg,rgba(255,255,255,0.95),var(--card));
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* Image */
.cover{
  display:flex;
  justify-content:center;
}
.cover img{
  width:65%;
  height:auto;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* Title */
.title{
  text-align:center;
  font-weight:500;
  font-size:20px;
}

/* Time box */
.time-box{
  background:white;
  border-radius:10px;
  padding:10px 16px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  display:flex;
  justify-content:space-between;
  font-weight:500;
  font-size:14px;
}

/* Slider */
.progress input{
  width:100%;
  -webkit-appearance:none;
  appearance:none;
  height:8px;
  border-radius:999px;
  background:linear-gradient(90deg,#000 var(--seek-percent,0%),rgba(0,0,0,0.08) var(--seek-percent,0%));
  outline:none;
}

input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#000;
  border:2px solid white;
  cursor:pointer;
}

input[type="range"]::-moz-range-thumb{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#000;
  border:2px solid white;
  cursor:pointer;
}

/* Controls */
.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
}

.btn{
  width:52px;
  height:52px;
  border-radius:50%;
  background:white;
  border:none;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
  cursor:pointer;
}

.btn.play{
  width:72px;
  height:72px;
  font-size:26px;
}

/* Password overlay */
#pw-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.35);
  z-index:9999;
}

.pw-modal{
  background:white;
  padding:18px;
  border-radius:12px;
  width:92%;
  max-width:360px;
  text-align:center;
}

.pw-modal input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

.pw-error{
  color:#b00020;
  font-weight:600;
  display:none;
}
</style>
</head>
<body>

<div id="pw-overlay">
  <div class="pw-modal">
    <h3>Enter password to view</h3>
    <input id="pw-input" type="password" placeholder="Password">
    <button id="pw-submit">Unlock</button>
    <div id="pw-error" class="pw-error">
      Womp womp, try again 😝 (unless you not my monkey, then GET OUT 🤨)
    </div>
  </div>
</div>

<div class="page-wrap" id="site" style="display:none;">
  <div class="card">

    <div class="cover">
      <img src="My_sunshine.JPG">
    </div>

    <div class="title">For my sunshine ☀️</div>

    <div class="time-box">
      <div id="curtime">0:00</div>
      <div id="remtime">-0:00</div>
    </div>

    <div class="progress">
      <input id="seek" type="range" min="0" value="0">
    </div>

    <div class="controls">
      <button class="btn" id="back10">⏮</button>
      <button class="btn play" id="playpause">▶</button>
      <button class="btn" id="fwd10">⏭</button>
    </div>

  </div>
</div>

<audio id="song" preload="none">
  <source src="My_sunshine.mp3" type="audio/mpeg">
</audio>

<script>
(function(){
  const PASSWORD="110323";
  const overlay=document.getElementById('pw-overlay');
  const site=document.getElementById('site');
  const input=document.getElementById('pw-input');
  const submit=document.getElementById('pw-submit');
  const err=document.getElementById('pw-error');

  function unlock(){
    if(input.value.trim()===PASSWORD){
      overlay.style.display='none';
      site.style.display='flex';
      audio.pause();
      audio.currentTime=0;
    }else{
      err.style.display='block';
      input.value='';
    }
  }

  submit.addEventListener('click',unlock);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
})();

(function(){
  const audio=document.getElementById('song');
  const playBtn=document.getElementById('playpause');
  const cur=document.getElementById('curtime');
  const rem=document.getElementById('remtime');
  const seek=document.getElementById('seek');

  function fmt(s){
    s=Math.floor(s||0);
    const m=Math.floor(s/60);
    const sec=s%60;
    return m+":"+(sec<10?"0"+sec:sec);
  }

  audio.addEventListener('loadedmetadata',()=>{
    seek.max=Math.floor(audio.duration);
  });

  audio.addEventListener('timeupdate',()=>{
    cur.textContent=fmt(audio.currentTime);
    rem.textContent="-"+fmt(audio.duration-audio.currentTime);
    seek.value=audio.currentTime;
    const pct=(audio.currentTime/audio.duration)*100||0;
    seek.style.setProperty('--seek-percent',pct+'%');
  });

  playBtn.addEventListener('click',()=>{
    if(audio.paused){
      audio.play();
      playBtn.textContent="❚❚";
    }else{
      audio.pause();
      playBtn.textContent="▶";
    }
  });

  seek.addEventListener('input',()=>{
    audio.currentTime=seek.value;
  });

  document.getElementById('back10').onclick=()=>audio.currentTime=Math.max(0,audio.currentTime-10);
  document.getElementById('fwd10').onclick=()=>audio.currentTime=Math.min(audio.duration,audio.currentTime+10);
})();
</script>

</body>
</html>
